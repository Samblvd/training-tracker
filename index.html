<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>训练记录</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- 左栏：概览 + 输入 -->
    <div class="left-panel">

      <div class="left-header">
        <h1>训练记录</h1>
        <span class="today-date" id="today-date"></span>
      </div>

      <div class="stats">
        <div class="stats-grid">
          <div class="stat-item">
            <span class="count" id="total">0</span>
            <span class="label">全部</span>
          </div>
          <div class="stat-item">
            <span class="count" id="count-健身">0</span>
            <span class="label">健身</span>
          </div>
          <div class="stat-item">
            <span class="count" id="count-足球">0</span>
            <span class="label">足球</span>
          </div>
          <div class="stat-item">
            <span class="count" id="count-网球">0</span>
            <span class="label">网球</span>
          </div>
        </div>
      </div>

      <div class="form">

        <div class="form-row">
          <div class="form-field">
            <label>日期</label>
            <input type="date" id="date">
          </div>
          <div class="form-field">
            <label>训练类型</label>
            <select id="type">
              <option>健身</option>
              <option>足球</option>
              <option>网球</option>
            </select>
          </div>
        </div>

        <!-- 健身专属区域 -->
        <div id="gym-section">

          <div class="form-row">
            <div class="form-field">
              <label>训练部位</label>
              <select id="muscle">
                <option>胸</option>
                <option>肩</option>
                <option>背</option>
                <option>臀</option>
              </select>
            </div>
            <div class="form-field">
              <label>AI 助手</label>
              <div>
                <button type="button" class="ai-entry-btn" id="ai-open-btn">✦ AI 生成今日计划</button>
              </div>
            </div>
          </div>

          <button type="button" id="load-last-btn" class="load-last-btn" style="display:none;">
            带入上次该部位训练
          </button>

          <div class="exercise-table-header">
            <span class="ex-header-name">动作</span>
            <span class="ex-header-cell">重量(kg)</span>
            <span class="ex-header-cell">组数</span>
            <span class="ex-header-cell">次数</span>
          </div>
          <div id="exercise-list" class="exercise-list"></div>

        </div>

        <div class="form-bottom">
          <input type="text" id="note" placeholder="备注（可选）">
          <button id="start-workout-btn" type="button">开始训练</button>
          <button id="btn">添加记录</button>
        </div>

      </div>

    </div>

    <!-- 右栏：训练记录列表 -->
    <div class="right-panel">
      <div class="panel-header">
        <span>训练记录</span>
        <span class="record-count" id="record-count"></span>
      </div>
      <ul id="list"></ul>
    </div>

  </div>

  <!-- AI 生成训练计划 Modal -->
  <div id="ai-modal" class="modal-overlay" style="display:none;">
    <div class="modal-panel">

      <div class="modal-header">
        <span class="modal-title">✦ AI 生成训练计划</span>
        <button class="modal-close" id="ai-modal-close">×</button>
      </div>

      <div class="modal-body">

        <!-- 输入选项 -->
        <div class="ai-form">

          <div class="ai-field">
            <label>训练部位</label>
            <div class="ai-options" id="ai-muscle">
              <button class="opt-btn active" data-value="胸">胸</button>
              <button class="opt-btn" data-value="肩">肩</button>
              <button class="opt-btn" data-value="背">背</button>
              <button class="opt-btn" data-value="臀">臀</button>
            </div>
          </div>

          <div class="ai-field">
            <label>训练目标</label>
            <div class="ai-options" id="ai-goal">
              <button class="opt-btn active" data-value="增肌">增肌</button>
              <button class="opt-btn" data-value="保持">保持</button>
              <button class="opt-btn" data-value="恢复">恢复</button>
            </div>
          </div>

          <div class="ai-field">
            <label>训练时长</label>
            <div class="ai-options" id="ai-duration">
              <button class="opt-btn active" data-value="45">45 分钟</button>
              <button class="opt-btn" data-value="60">60 分钟</button>
              <button class="opt-btn" data-value="75">75 分钟</button>
            </div>
          </div>

          <div class="ai-field">
            <label>器械条件</label>
            <div class="ai-options" id="ai-equipment">
              <button class="opt-btn active" data-value="健身房">健身房</button>
              <button class="opt-btn" data-value="家里">家里</button>
            </div>
          </div>

          <button id="ai-generate-btn">生成计划</button>

        </div>

        <!-- 结果区域（默认隐藏） -->
        <div id="ai-result" style="display:none;">
          <div class="ai-result-header">
            <span id="ai-result-title"></span>
          </div>
          <div id="ai-result-list" class="ai-result-list"></div>
          <div class="ai-result-actions">
            <button id="ai-import-btn">导入到今日训练</button>
            <button id="ai-regen-btn" class="btn-ghost">重新生成</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- 对比上次训练 Modal -->
  <div id="compare-modal" class="modal-overlay" style="display:none;">
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title cmp-title" id="compare-title">对比上次训练</span>
        <button class="modal-close" id="compare-modal-close">×</button>
      </div>
      <div class="modal-body" id="compare-body"></div>
    </div>
  </div>

  <!-- 训练中模式面板 -->
  <div id="workout-overlay" class="workout-overlay" style="display:none;">
    <div class="wm-panel">

      <div class="wm-header">
        <span class="wm-header-title">训练中</span>
        <button id="wm-exit-btn" class="wm-exit-btn">退出训练</button>
      </div>

      <div class="wm-body">

        <!-- working / resting 状态 -->
        <div id="wm-main">
          <div class="wm-ex-name" id="wm-ex-name"></div>
          <div class="wm-target" id="wm-target"></div>
          <div class="wm-progress" id="wm-progress"></div>

          <button id="wm-done-btn" class="wm-done-btn">完成本组</button>

          <div id="wm-rest-area" class="wm-rest-area" style="display:none;">
            <div class="wm-rest-label" id="wm-rest-label">休息中</div>
            <div class="wm-timer" id="wm-timer">01:30</div>
            <button id="wm-skip-btn" class="wm-skip-btn">跳过休息</button>
          </div>
        </div>

        <!-- ex-done 状态 -->
        <div id="wm-ex-done" style="display:none;">
          <div class="wm-done-icon">✓</div>
          <div class="wm-done-msg" id="wm-done-msg"></div>
          <div class="wm-next-hint" id="wm-next-hint"></div>
          <button id="wm-next-ex-btn" class="wm-done-btn">进入下一动作</button>
        </div>

        <!-- all-done 状态 -->
        <div id="wm-all-done" style="display:none;">
          <div class="wm-done-icon">🎉</div>
          <div class="wm-done-msg">训练完成！</div>
          <button id="wm-finish-btn" class="wm-done-btn">返回记录</button>
        </div>

      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
