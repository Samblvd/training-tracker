<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>训练记录</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="left-panel">
      <div class="left-header">
        <h1>训练记录</h1>
        <span class="today-date" id="today-date"></span>
      </div>

      <div class="stats">
        <div class="stats-grid">
          <div class="stat-item">
            <span class="count" id="total">0</span>
            <span class="label">全部训练</span>
          </div>
          <div class="stat-item">
            <span class="count" id="count-week">0</span>
            <span class="label">本周</span>
          </div>
          <div class="stat-item">
            <span class="count" id="count-month">0</span>
            <span class="label">本月</span>
          </div>
        </div>
      </div>

      <div id="draft-banner" class="draft-banner" style="display:none;">
        <span id="draft-banner-text">继续上次训练</span>
        <div class="draft-banner-actions">
          <button id="draft-resume-btn" class="draft-resume-btn">继续</button>
          <button id="draft-discard-btn" class="draft-discard-btn">丢弃</button>
        </div>
      </div>

      <div class="form">
        <input type="hidden" id="muscle" value="胸">

        <div class="home-core">
          <div class="prep-section">
            <span class="prep-label">训练部位</span>
            <div class="pill-group" id="muscle-pills">
              <button class="pill active" data-value="胸">胸</button>
              <button class="pill" data-value="肩">肩</button>
              <button class="pill" data-value="背">背</button>
              <button class="pill" data-value="臀腿">臀腿</button>
            </div>
          </div>

          <div class="main-actions">
            <button id="start-workout-btn" type="button" class="btn-primary-workout">开始训练</button>
          </div>

          <div class="prep-action-row">
            <button type="button" class="ai-entry-btn" id="ai-open-btn">AI 生成今日计划</button>
            <button type="button" class="manual-btn" id="manual-arrange-btn">自己选动作</button>
          </div>
        </div>

        <div id="exercise-section" class="exercise-section" style="display:none;">
          <div class="exercise-section-head">
            <span class="prep-label">动作计划</span>
            <button type="button" id="load-last-btn" class="load-last-btn" style="display:none;">
              带入上次同部位训练
            </button>
          </div>
          <div class="exercise-table-header">
            <span class="ex-header-name">动作</span>
            <span class="ex-header-cell">重量(kg)</span>
            <span class="ex-header-cell">组数</span>
            <span class="ex-header-cell">次数</span>
          </div>
          <div id="exercise-list" class="exercise-list"></div>
        </div>

        <div class="backfill-entry-row">
          <button id="backfill-open-btn" class="backfill-link">＋ 补录过去训练记录</button>
        </div>

        <div id="backfill-section" class="backfill-section" style="display:none;">
          <div class="backfill-header">
            <span class="prep-label">补录训练</span>
            <button id="backfill-cancel-btn" class="backfill-cancel">取消</button>
          </div>
          <input type="date" id="backfill-date" class="date-input">
          <button id="backfill-save-btn" class="btn-secondary-save">保存补录</button>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="panel-header">
        <span>历史记录</span>
        <div class="panel-header-right">
          <span class="record-count" id="record-count"></span>
          <button id="export-btn" class="data-btn" title="导出数据">导出</button>
          <label class="data-btn" title="导入数据">导入
            <input type="file" id="import-file" accept=".json" style="display:none;">
          </label>
        </div>
      </div>
      <ul id="list"></ul>
    </div>
  </div>

  <div id="ai-modal" class="modal-overlay" style="display:none;">
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title">AI 生成今日计划</span>
        <button class="modal-close" id="ai-modal-close" type="button">×</button>
      </div>

      <div class="modal-body">
        <div class="ai-form">
          <div class="ai-field">
            <label>训练部位</label>
            <div class="ai-options" id="ai-muscle">
              <button class="opt-btn active" data-value="胸">胸</button>
              <button class="opt-btn" data-value="肩">肩</button>
              <button class="opt-btn" data-value="背">背</button>
              <button class="opt-btn" data-value="臀腿">臀腿</button>
            </div>
          </div>

          <div class="ai-field">
            <label>训练目标</label>
            <div class="ai-options" id="ai-goal">
              <button class="opt-btn active" data-value="增肌">增肌</button>
              <button class="opt-btn" data-value="保持">保持</button>
              <button class="opt-btn" data-value="恢复">恢复</button>
            </div>
          </div>

          <div class="ai-field">
            <label>训练时长</label>
            <div class="ai-options" id="ai-duration">
              <button class="opt-btn active" data-value="45">45 分钟</button>
              <button class="opt-btn" data-value="60">60 分钟</button>
              <button class="opt-btn" data-value="75">75 分钟</button>
            </div>
          </div>

          <div class="ai-field">
            <label>器械条件</label>
            <div class="ai-options" id="ai-equipment">
              <button class="opt-btn active" data-value="健身房">健身房</button>
              <button class="opt-btn" data-value="家里">家里</button>
            </div>
          </div>

          <button id="ai-generate-btn" type="button">生成计划</button>
        </div>

        <div id="ai-result" style="display:none;">
          <div class="ai-result-header">
            <span id="ai-result-title"></span>
          </div>
          <div id="ai-result-list" class="ai-result-list"></div>
          <div class="ai-result-actions">
            <button id="ai-import-btn" type="button">导入到今日训练</button>
            <button id="ai-regen-btn" type="button" class="btn-ghost">重新生成</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="compare-modal" class="modal-overlay" style="display:none;">
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title cmp-title" id="compare-title">对比上次训练</span>
        <button class="modal-close" id="compare-modal-close" type="button">×</button>
      </div>
      <div class="modal-body" id="compare-body"></div>
    </div>
  </div>

  <div id="workout-overlay" class="workout-overlay" style="display:none;">
    <div class="wm-panel">
      <div class="wm-header">
        <div class="wm-header-info">
          <span class="wm-header-muscle" id="wm-header-muscle"></span>
          <span class="wm-header-ex" id="wm-header-ex"></span>
        </div>
        <button id="wm-exit-btn" class="wm-exit-btn" type="button">退出</button>
      </div>

      <div class="wm-body">
        <div id="wm-working" class="wm-state">
          <div class="wm-current-card">
            <div class="wm-ex-name" id="wm-ex-name"></div>
            <div class="wm-target" id="wm-target"></div>
            <div class="wm-progress" id="wm-progress"></div>
          </div>

          <div class="wm-section">
            <div class="wm-section-label">已完成组</div>
            <div id="wm-sets-done" class="wm-sets-done"></div>
          </div>

          <div class="wm-section wm-input-card">
            <div class="wm-section-head">
              <span class="wm-section-label">本组记录</span>
              <div id="wm-rest-config" class="wm-rest-config">
                休息 <input type="number" id="wm-input-rest" class="wm-rest-input" min="0"> 秒
              </div>
            </div>

            <div id="wm-set-inputs" class="wm-set-inputs">
              <div class="wm-set-field">
                <label class="wm-set-label">重量 kg</label>
                <input type="number" id="wm-input-weight" class="wm-input" min="0">
              </div>
              <div class="wm-set-field">
                <label class="wm-set-label">次数</label>
                <input type="number" id="wm-input-reps" class="wm-input" min="0">
              </div>
            </div>
          </div>

          <div class="wm-footer-actions">
            <button id="wm-done-btn" class="wm-done-btn" type="button">完成本组</button>
            <div class="wm-secondary-actions">
              <button id="wm-skip-ex-btn" class="wm-secondary-btn" type="button">跳过当前动作</button>
            </div>
          </div>
        </div>

        <div id="wm-resting" class="wm-state" style="display:none;">
          <div class="wm-rest-card">
            <div class="wm-rest-label" id="wm-rest-label">休息中</div>
            <div class="wm-rest-ex-name" id="wm-rest-ex-name"></div>
            <div class="wm-timer" id="wm-timer">01:30</div>
            <div class="wm-rest-next" id="wm-rest-next">下一组 第 2 / 4 组</div>
          </div>

          <div class="wm-footer-actions">
            <button id="wm-skip-btn" class="wm-done-btn" type="button">跳过休息</button>
            <div class="wm-secondary-actions">
              <button id="wm-extend-rest-btn" class="wm-secondary-btn" type="button">延长 30 秒</button>
              <button id="wm-skip-ex-rest-btn" class="wm-secondary-btn" type="button">跳过当前动作</button>
            </div>
          </div>
        </div>

        <div id="wm-ex-done" class="wm-state wm-message-state" style="display:none;">
          <div class="wm-done-icon">完成</div>
          <div class="wm-done-msg">当前动作已完成</div>
          <div class="wm-done-title" id="wm-done-msg"></div>
          <div class="wm-next-hint" id="wm-next-hint"></div>
          <button id="wm-next-ex-btn" class="wm-done-btn" type="button">进入下一动作</button>
        </div>

        <div id="wm-all-done" class="wm-state wm-message-state" style="display:none;">
          <div class="wm-done-icon">完成</div>
          <div class="wm-done-msg">训练完成</div>
          <div class="wm-all-summary" id="wm-all-summary"></div>
          <div class="wm-summary-metrics" id="wm-summary-metrics"></div>
          <div class="wm-summary-card">
            <div class="wm-summary-title">进步动作</div>
            <div id="wm-summary-progress" class="wm-summary-list"></div>
          </div>
          <div class="wm-summary-card">
            <div class="wm-summary-title">需要注意</div>
            <div id="wm-summary-cautions" class="wm-summary-list"></div>
          </div>
          <div class="wm-summary-card">
            <div class="wm-summary-title">下次建议</div>
            <div id="wm-summary-suggestions" class="wm-summary-list"></div>
          </div>
          <button id="wm-finish-btn" class="wm-done-btn" type="button">保存并返回记录</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
